<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Match Lobby | SkillXI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="assets/css/style.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
    tailwind.config = {
        theme: { extend: {
            colors: {
                "primary":"#00D09C", "surface":"#FFFFFF", "background":"#FFFFFF", "secondary":"#1A1A1A", "on-surface": "#1A1A1A", "error": "#E21D26"
            },
            fontFamily:{ headline:["Space Grotesk"], body:["Inter"] }
        }}
    }
    </script>
</head>
<body class="bg-white text-gray-900 font-body min-h-screen pb-24">

<!-- HEADER: Match Info -->
<div class="bg-white pt-12 pb-8 px-6 border-b border-gray-100 sticky top-0 z-50">
    <div class="flex justify-between items-center max-w-2xl mx-auto">
        <button onclick="history.back()" class="p-2 text-gray-900"><span class="material-symbols-outlined">arrow_back</span></button>
        <div class="text-center">
            <h1 id="lobby-match-name" class="font-headline font-black text-xl mb-1 uppercase italic">Loading Match...</h1>
            <p id="lobby-match-time" class="text-xs text-primary font-black tracking-widest uppercase italic">00H 00M 00S LEFT</p>
        </div>
        <button class="p-2 relative bg-gray-50 rounded-xl border border-gray-100 px-4 flex items-center gap-2">
            <span class="material-symbols-outlined text-primary text-sm">account_balance_wallet</span>
            <span id="lobby-wallet-bal" class="text-xs font-black text-gray-900">...</span>
        </button>
    </div>
</div>

<!-- MATCH HEADER VISUAL -->
<div class="p-6 max-w-2xl mx-auto">
    <div class="bg-white border border-gray-100 rounded-3xl p-8 mb-8 relative overflow-hidden shadow-sm">
        <div class="relative z-10 flex justify-between items-center">
            <div class="text-center w-1/3">
                <div class="w-20 h-20 rounded-2xl bg-gray-50 border border-gray-100 mx-auto flex items-center justify-center mb-4">
                    <span id="home-tag" class="font-headline font-black text-2xl text-gray-900">...</span>
                </div>
                <p id="home-name" class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Home Team</p>
            </div>
            <div class="text-center w-1/3">
                <span class="text-4xl font-headline font-black text-gray-100 italic">VS</span>
            </div>
            <div class="text-center w-1/3">
                <div class="w-20 h-20 rounded-2xl bg-gray-50 border border-gray-100 mx-auto flex items-center justify-center mb-4">
                    <span id="away-tag" class="font-headline font-black text-2xl text-gray-900">...</span>
                </div>
                <p id="away-name" class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Away Team</p>
            </div>
        </div>
    </div>

    <!-- TABS -->
    <div class="flex border-b border-gray-100 mb-8">
        <button class="flex-1 py-4 text-xs font-black border-b-2 border-primary text-primary uppercase tracking-widest">CONTESTS</button>
        <button class="flex-1 py-4 text-xs font-black text-gray-300 uppercase tracking-widest">YOUR TEAMS (0)</button>
    </div>

    <!-- CONTEST CARDS — dynamically injected by the load script below -->
    <div id="lobby-contest-cards" class="space-y-6">
        <!-- Loading state -->
        <p class="text-center text-gray-400 font-black uppercase text-xs tracking-widest py-12">Loading contest types...</p>
    </div>
</div>

<!-- BOTTOM AI STRIP -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 pb-safe bg-white/95 backdrop-blur-2xl border-t border-gray-100 shadow-lg md:hidden z-50 rounded-t-[2.5rem]">
<a class="flex flex-col items-center justify-center text-gray-400 p-3 hover:text-primary transition-all bg-primary/10 text-primary rounded-2xl px-6 py-2" href="index.html">
<span class="material-symbols-outlined">sports_kabaddi</span>
<span class="font-['Inter'] text-[9px] font-black uppercase tracking-[0.2em] mt-1">Lobby</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-400 p-3 hover:text-primary transition-all " href="pre-match.html">
<span class="material-symbols-outlined">auto_awesome</span>
<span class="font-['Inter'] text-[9px] font-black uppercase tracking-[0.2em] mt-1">Intel</span>
</a>
<a href="lineup.html" class="flex flex-col items-center justify-center bg-primary text-white rounded-full p-4 -mt-10 shadow-lg active:scale-90 transition-all">
<span class="material-symbols-outlined text-3xl">add</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-400 p-3 hover:text-primary transition-all " href="leaderboard.html">
<span class="material-symbols-outlined">analytics</span>
<span class="font-['Inter'] text-[9px] font-black uppercase tracking-[0.2em] mt-1">Stats</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-400 p-3 hover:text-primary transition-all " href="profile.html">
<span class="material-symbols-outlined">person</span>
<span class="font-['Inter'] text-[9px] font-black uppercase tracking-[0.2em] mt-1">Profile</span>
</a>
</nav>

<script src="assets/js/main.js"></script>
<script>
    window.addEventListener('load', async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('match');
        
        let contests = window.CURRENT_CONTESTS;
        if (!contests || contests.length === 0) {
            contests = await window.getContests();
            window.CURRENT_CONTESTS = contests;
        }
        
        const contest = contests.find(c => c.id === matchId) || contests[0];
        const cid = contest ? contest.id : 'c001';

        // Hydrate match header
        document.getElementById('lobby-match-name').innerText = `${contest.homeTag} vs ${contest.awayTag}`;
        document.getElementById('home-tag').innerText = contest.homeTag;
        document.getElementById('away-tag').innerText = contest.awayTag;
        document.getElementById('home-name').innerText = contest.homeTeam;
        document.getElementById('away-name').innerText = contest.awayTeam;

        // Live countdown using timeLeft from contest data
        let secsLeft = Math.max(0, Math.floor(contest.timeLeft || 0));
        const timerEl = document.getElementById('lobby-match-time');
        const tick = () => {
            const h = String(Math.floor(secsLeft / 3600)).padStart(2, '0');
            const m = String(Math.floor((secsLeft % 3600) / 60)).padStart(2, '0');
            const s = String(Math.floor(secsLeft % 60)).padStart(2, '0');
            if (timerEl) timerEl.innerText = `${h}H ${m}M ${s}S LEFT`;
            if (secsLeft > 0) secsLeft--;
        };
        tick();
        setInterval(tick, 1000);

        // Wallet balance
        const bal = window.localStorage.getItem('skillxi_sol_bal') || '0.0';
        document.getElementById('lobby-wallet-bal').innerText = bal + ' SOL';

        // Dynamically render contest type cards using real contest entry fee & prize
        const entryFee = parseFloat(contest.entry || 0.1);
        const prize = parseFloat(contest.prize || 8.5);
        const filled = contest.currentPlayers || 0;
        const maxSpots = contest.maxPlayers || 200;
        const fillPct = Math.round((filled / maxSpots) * 100);

        document.getElementById('lobby-contest-cards').innerHTML = `
            <!-- MEGA Contest -->
            <div class="bg-white border border-gray-100 rounded-3xl overflow-hidden shadow-sm hover:border-primary transition-all">
                <div class="p-6">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h4 class="text-[10px] font-black text-primary uppercase tracking-widest mb-1">Grand Prize Pool 🏆</h4>
                            <p class="text-3xl font-headline font-black italic uppercase">${prize} SOL PRIZE</p>
                        </div>
                        <span class="text-[9px] bg-amber-50 text-amber-700 font-black uppercase tracking-widest px-3 py-1 rounded-full border border-amber-100">Demo</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-1">WINNER TAKES</p>
                            <p class="font-black text-xl text-gray-900 uppercase italic">${(prize * 0.4).toFixed(2)} SOL</p>
                        </div>
                        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100">
                            <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-1">ENTRY FEE</p>
                            <p class="font-black text-xl text-primary uppercase italic">${entryFee} SOL</p>
                        </div>
                    </div>
                    <div class="mb-6">
                        <div class="flex justify-between text-[10px] font-black uppercase tracking-widest mb-2">
                            <span class="text-gray-400">${maxSpots} total spots</span>
                            <span class="text-primary italic">${maxSpots - filled} spots left</span>
                        </div>
                        <div class="h-2 w-full bg-gray-100 rounded-full overflow-hidden">
                            <div class="h-full bg-primary" style="width:${fillPct}%"></div>
                        </div>
                    </div>
                    <button onclick="window.location.href='lineup.html?match=${cid}&contest=${cid}&type=mega'" 
                        class="w-full bg-primary text-white font-headline font-black py-5 rounded-2xl hover:bg-primary/90 transition-all uppercase tracking-widest">
                        JOIN CONTEST
                    </button>
                </div>
            </div>

            <!-- 1v1 Battle -->
            <div class="bg-white border border-gray-100 rounded-3xl overflow-hidden shadow-sm hover:border-primary transition-all">
                <div class="p-6">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">1v1 Battle ⚔️</h4>
                            <p class="text-xl font-headline font-black uppercase">${(entryFee * 2).toFixed(2)} SOL POOL</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest">Entry Fee</p>
                            <p class="font-black text-primary">${entryFee} SOL</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest">Prize</p>
                            <p class="font-black text-gray-900">${(entryFee * 1.8).toFixed(2)} SOL</p>
                        </div>
                    </div>
                    <button onclick="window.location.href='lineup.html?match=${cid}&contest=${cid}&type=1v1'" 
                        class="w-full bg-gray-50 border border-gray-100 text-gray-900 font-headline font-black py-4 rounded-xl hover:bg-gray-100 transition-all uppercase tracking-widest">
                        JOIN BATTLE
                    </button>
                </div>
            </div>

            <!-- Mini League -->
            <div class="bg-white border border-gray-100 rounded-3xl overflow-hidden shadow-sm">
                <div class="p-6">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Mini League 🎯</h4>
                            <p class="text-xl font-headline font-black uppercase italic">${(entryFee * 8).toFixed(2)} SOL POOL</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-center mb-6">
                        <div>
                            <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest">Entry</p>
                            <p class="font-black text-primary">${entryFee} SOL</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-gray-400 font-black uppercase tracking-widest">Spots</p>
                            <p class="font-black text-gray-900">10 SPOTS</p>
                        </div>
                    </div>
                    <button onclick="window.location.href='lineup.html?match=${cid}&contest=${cid}&type=mini'" 
                        class="w-full bg-gray-50 border border-gray-100 text-gray-900 font-headline font-black py-4 rounded-xl hover:bg-gray-100 transition-all uppercase tracking-widest">
                        JOIN LEAGUE
                    </button>
                </div>
            </div>
        `;

        // Update AI tip strip
        const aiStrip = document.querySelector('.fixed.bottom-0 p');
        if (aiStrip && contest.aiTip) {
            aiStrip.innerText = `AI Analyst: ${contest.aiTip}`;
        }
    });
</script>
</body>
</html>
