<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SkillXI | Build Your Team</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="assets/css/style.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
    tailwind.config = {
        theme: { extend: {
            colors: { 
                "primary":"#00D09C", 
                "surface":"#FFFFFF", 
                "background":"#FFFFFF", 
                "secondary":"#1A1A1A", 
                "on-surface": "#1A1A1A",
                "on-surface-variant": "#718096",
                "outline": "#EEEEEE",
                "outline-variant": "#F3F4F6",
                "error": "#E21D26"
            },
            fontFamily:{ headline:["Space Grotesk"], body:["Inter"] }
        }}
    }
    </script>
    <style>
        .sticky-top { position: sticky; top: 0; z-index: 100; }
        .tab-active { color: #00D09C; border-bottom: 2px solid #00D09C; }
        .pitch-bg { background: #FFFFFF; border: 1px dashed #EEEEEE; position: relative; }
        .pitch-grass { background: #F6F9FC; }
    </style>
    <!-- Solana Web3 Integrations -->
    <script src="https://bundle.run/buffer@6.0.3"></script>
    <script>window.Buffer = window.Buffer || buffer.Buffer;</script>
    <script src="https://unpkg.com/@solana/web3.js@1.89.2/lib/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body class="bg-white text-[#1A1A1A] font-body min-h-screen flex flex-col">

<!-- TOP BAR (Sticky) -->
<header class="sticky-top bg-white border-b border-gray-100">
    <div class="px-6 py-4 flex justify-between items-center">
        <div>
            <h1 id="match-header-title" class="font-headline font-extrabold text-sm text-primary uppercase tracking-widest">Man City vs Arsenal</h1>
            <p id="selected-count" class="text-xs font-bold text-slate-400">0/11 selected</p>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-slate-500 font-bold uppercase">Budget Left</p>
            <p id="budget-remaining" class="text-sm font-black text-[#00ff88]">100.0 Credits</p>
        </div>
    </div>
    <div class="h-1 w-full bg-gray-50">
        <div id="selection-progress" class="h-full bg-primary transition-all duration-300" style="width: 0%"></div>
    </div>
    <!-- Tabs -->
    <div class="flex">
        <button onclick="switchView('selection')" id="tab-selection" class="flex-1 py-4 text-xs font-bold uppercase tracking-widest tab-active">Select Players</button>
        <button onclick="switchView('team')" id="tab-team" class="flex-1 py-4 text-xs font-bold uppercase tracking-widest text-slate-500">My Team (<span id="my-team-badge">0</span>)</button>
    </div>
</header>

<!-- MAIN CONTENT AREA -->
<main class="flex-1 overflow-y-auto px-4 pb-32">
    
    <!-- VIEW A: PLAYER SELECTION -->
    <section id="view-selection" class="py-6 max-w-2xl mx-auto">
        <!-- Position Filter Bar -->
        <div class="flex gap-2 overflow-x-auto pb-4 mb-4 scrollbar-hide">
            <button onclick="filterPos('ALL')" class="pos-filter px-6 py-2 rounded-xl border border-primary bg-primary/5 text-primary text-xs font-bold whitespace-nowrap">ALL</button>
            <button onclick="filterPos('GK')" class="pos-filter px-6 py-2 rounded-xl border border-gray-100 bg-white text-gray-400 text-xs font-bold whitespace-nowrap">GK</button>
            <button onclick="filterPos('DEF')" class="pos-filter px-6 py-2 rounded-xl border border-gray-100 bg-white text-gray-400 text-xs font-bold whitespace-nowrap">DEF</button>
            <button onclick="filterPos('MID')" class="pos-filter px-6 py-2 rounded-xl border border-gray-100 bg-white text-gray-400 text-xs font-bold whitespace-nowrap">MID</button>
            <button onclick="filterPos('FWD')" class="pos-filter px-6 py-2 rounded-xl border border-gray-100 bg-white text-gray-400 text-xs font-bold whitespace-nowrap">FWD</button>
        </div>

        <!-- Player List -->
        <div id="player-selection-list" class="space-y-3">
            <!-- Populated by main.js -->
        </div>
    </section>

    <!-- VIEW B: MY TEAM -->
    <section id="view-team" class="hidden py-6 h-full max-w-2xl mx-auto flex flex-col">
        <div class="flex-1 pitch-bg rounded-3xl border border-gray-100 relative p-8 flex flex-col justify-around min-h-[600px] overflow-hidden pitch-grass">
            <!-- Pitch Markings -->
            <div class="absolute inset-x-0 top-1/2 -translate-y-1/2 border-t-2 border-dashed border-gray-200 opacity-50"></div>
            <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 border-2 border-dashed border-gray-200 rounded-full opacity-50"></div>
            
            <div id="my-team-pitch" class="flex flex-col-reverse h-full justify-around relative z-10 text-center">
                <!-- Groups will be rendered here by main.js: GK at bottom, FWD at top -->
            </div>
        </div>
        
        <div class="mt-8 p-6 bg-gray-50 rounded-2xl border border-gray-100 text-center">
            <h4 class="text-xs font-bold text-gray-500 uppercase mb-4">Tactical Preview</h4>
            <p class="text-[10px] text-gray-400 italic">Visualizing your formation</p>
        </div>
    </section>

    <!-- VIEW C: ASSIGN ROLES (Dedicated Screen) -->
    <section id="view-roles" class="hidden py-6 max-w-2xl mx-auto">
        <div class="mb-8 text-center px-4">
            <h2 class="font-headline font-black text-2xl uppercase italic text-gray-900 leading-tight">Assign Leaders</h2>
            <div class="h-1 w-12 bg-primary mx-auto my-3 rounded-full"></div>
            <p class="text-gray-400 text-[10px] font-black uppercase tracking-widest">Select your Captain (2x) & Vice-Captain (1.5x)</p>
        </div>
        <div id="role-selection-list" class="space-y-3 px-2">
            <!-- Populated by main.js -->
        </div>
    </section>

</main>

<!-- GUIDED ACTION BUTTON -->
<div class="fixed bottom-28 left-0 w-full px-6 z-40">
    <button id="main-action-btn" onclick="window.handleMainAction()" class="w-full py-4 bg-gray-200 text-gray-500 font-black uppercase tracking-widest text-xs rounded-2xl shadow-xl transition-all flex items-center justify-center gap-3">
        <span id="action-btn-icon" class="material-symbols-outlined text-lg">lock</span>
        <span id="action-btn-text">Select 11 Players</span>
    </button>
</div>

<!-- BOTTOM ACTION BAR -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 pb-safe bg-white/95 backdrop-blur-2xl border-t border-gray-100 shadow-lg md:hidden z-50 rounded-t-[2.5rem]">
<a class="flex flex-col items-center justify-center text-gray-400 p-3 hover:text-primary transition-all " href="index.html">
<span class="material-symbols-outlined">sports_kabaddi</span>
<span class="font-['Inter'] text-[9px] font-black uppercase tracking-[0.2em] mt-1">Lobby</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-400 p-3 hover:text-primary transition-all " href="pre-match.html">
<span class="material-symbols-outlined">auto_awesome</span>
<span class="font-['Inter'] text-[9px] font-black uppercase tracking-[0.2em] mt-1">Intel</span>
</a>
<a href="lineup.html" class="flex flex-col items-center justify-center bg-primary text-white rounded-full p-4 -mt-10 shadow-lg active:scale-90 transition-all">
<span class="material-symbols-outlined text-3xl">add</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-400 p-3 hover:text-primary transition-all " href="leaderboard.html">
<span class="material-symbols-outlined">analytics</span>
<span class="font-['Inter'] text-[9px] font-black uppercase tracking-[0.2em] mt-1">Stats</span>
</a>
<a class="flex flex-col items-center justify-center text-gray-400 p-3 hover:text-primary transition-all " href="profile.html">
<span class="material-symbols-outlined">person</span>
<span class="font-['Inter'] text-[9px] font-black uppercase tracking-[0.2em] mt-1">Profile</span>
</a>
</nav>

<script src="assets/js/main.js"></script>
<script>
    window.switchView = function(view) {
        const selectionView = document.getElementById('view-selection');
        const teamView = document.getElementById('view-team');
        const rolesView = document.getElementById('view-roles');
        const tabSel = document.getElementById('tab-selection');
        const tabTeam = document.getElementById('tab-team');

        selectionView.classList.add('hidden');
        teamView.classList.add('hidden');
        rolesView.classList.add('hidden');
        tabSel.classList.remove('tab-active');
        tabSel.classList.add('text-slate-500');
        tabTeam.classList.remove('tab-active');
        tabTeam.classList.add('text-slate-500');

        if (view === 'selection') {
            selectionView.classList.remove('hidden');
            tabSel.classList.add('tab-active');
            tabSel.classList.remove('text-slate-500');
            window.currentLineupStep = 1;
        } else if (view === 'team') {
            teamView.classList.remove('hidden');
            tabTeam.classList.add('tab-active');
            tabTeam.classList.remove('text-slate-500');
            window.currentLineupStep = 2;
        } else if (view === 'roles') {
            rolesView.classList.remove('hidden');
            window.currentLineupStep = 3;
            window.renderRoleSelection();
        }
        window.updateBuilderUI();
    };

    function filterPos(pos) {
        window.currentPosFilter = pos;
        document.querySelectorAll('.pos-filter').forEach(btn => {
            btn.classList.remove('border-primary', 'bg-primary/5', 'text-primary');
            btn.classList.add('border-gray-100', 'bg-white', 'text-gray-400');
        });
        const active = Array.from(document.querySelectorAll('.pos-filter')).find(x => x.innerText.trim() === pos);
        if (active) {
            active.classList.add('border-primary', 'bg-primary/5', 'text-primary');
            active.classList.remove('border-gray-100', 'bg-white', 'text-gray-400');
        }
        window.renderPlayerList && window.renderPlayerList(pos);
    }

    // proceedToConfirm is defined in main.js — no need to redefine here

    // Single load handler — main.js DOMContentLoaded fires first (globals ready),
    // then this 'load' fires to do page-specific init safely.
    window.addEventListener('load', async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get('match');
        const contestId = urlParams.get('contest');

        // Hydrate match title
        let contests = window.CURRENT_CONTESTS;
        if (!contests || contests.length === 0) {
            contests = await window.getContests();
            window.CURRENT_CONTESTS = contests;
        }
        const contest = contests.find(c => c.id === (matchId || contestId)) || contests[0];
        if (contest) {
            document.getElementById('match-header-title').innerText =
                `${contest.homeTeam} vs ${contest.awayTeam}`;
        }

        // Render player list — single call, no race with main.js
        // (main.js DOMContentLoaded skips lineup page intentionally)
        await window.renderPlayerList('ALL', matchId || null);
        window.updateBuilderUI();
    });
</script>
</body>
</html>
