<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet"/>
<script src="https://bundle.run/buffer@6.0.3"></script>
<script>window.Buffer = window.Buffer || buffer.Buffer;</script>
<script src="https://unpkg.com/@solana/web3.js@1.89.2/lib/index.iife.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root { color-scheme: dark; --bg:#09090d; --panel:#13131f; --line:#242438; --text:#f6f7fb; --muted:#a0a0b8; --primary:#a8e8ff; --green:#00ff88; --violet:#d2bbff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:Inter, sans-serif; min-height:100vh; }
  .sx-shell { min-height:100vh; background:radial-gradient(circle at top left, rgba(168,232,255,.12), transparent 36%), var(--bg); }
  .sx-header { height:76px; display:flex; justify-content:space-between; align-items:center; padding:0 28px; border-bottom:1px solid rgba(255,255,255,.06); background:rgba(9,9,13,.82); backdrop-filter:blur(14px); position:sticky; top:0; z-index:2; }
  .sx-logo { color:var(--primary); text-decoration:none; font-family:'Space Grotesk', sans-serif; font-size:24px; font-weight:900; }
  .sx-wallet, .sx-header button { color:var(--primary); background:rgba(168,232,255,.08); border:1px solid rgba(168,232,255,.2); border-radius:999px; padding:10px 14px; text-decoration:none; font-weight:800; cursor:pointer; }
  .sx-main { width:min(1180px, calc(100% - 32px)); margin:0 auto; padding:48px 0 80px; }
  .sx-kicker { color:var(--primary); text-transform:uppercase; letter-spacing:.14em; font-size:12px; font-weight:900; margin:0 0 10px; }
  h1 { font-family:'Space Grotesk', sans-serif; font-size:clamp(36px, 7vw, 72px); line-height:.98; margin:0 0 12px; letter-spacing:0; }
  h2 { font-family:'Space Grotesk', sans-serif; margin:0; }
  .sx-copy p, .sx-main > p, .sx-muted { color:var(--muted); line-height:1.7; }
  .sx-grid { display:grid; grid-template-columns:minmax(0,1.5fr) minmax(300px,.75fr); gap:18px; align-items:start; margin-top:28px; }
  .sx-panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:22px; margin-top:18px; }
  .sx-panel-head { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:18px; }
  .sx-player-grid, .sx-card-list, .sx-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:12px; }
  .sx-player-grid article, .sx-stats article { position:relative; background:#0d0d14; border:1px solid #202033; border-radius:8px; padding:14px; min-height:86px; }
  .sx-player-grid strong, .sx-player-grid span { display:block; }
  .sx-player-grid span, .sx-row span, .sx-panel p { color:var(--muted); font-size:13px; }
  .sx-player-grid b { position:absolute; top:10px; right:10px; background:#ffd166; color:#111; border-radius:999px; padding:4px 7px; font-size:11px; }
  .sx-row { display:flex; justify-content:space-between; gap:14px; padding:13px 0; border-bottom:1px solid rgba(255,255,255,.06); }
  .sx-note { margin:18px 0; border:1px solid rgba(0,255,136,.2); background:rgba(0,255,136,.08); color:#dfffee; border-radius:8px; padding:13px; font-size:13px; line-height:1.6; }
  button, .sx-panel button { width:100%; background:linear-gradient(135deg,var(--green),#00d4ff); color:#041118; border:none; border-radius:8px; padding:14px 16px; font-weight:900; cursor:pointer; }
  .sx-secondary { margin-top:10px; background:#1f1f2e !important; color:var(--primary) !important; border:1px solid var(--line) !important; }
  .sx-table { display:grid; gap:8px; }
  .sx-table > div { display:grid; grid-template-columns:1.5fr 1fr 1fr repeat(3,90px); gap:8px; align-items:center; background:#0d0d14; border:1px solid #202033; border-radius:8px; padding:10px; }
  .sx-table button { padding:9px 10px; font-size:12px; }
  .sx-stats article b { display:block; color:var(--green); font-size:24px; }
  .sx-stats article span { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.08em; }
  @media (max-width: 820px) { .sx-grid { grid-template-columns:1fr; } .sx-table > div { grid-template-columns:1fr; } .sx-header { padding:0 16px; } }
</style><title>Review & Pay | SkillXI</title></head><body><div id="skillxi-confirm-root"></div><script src="assets/js/main.js"></script></body></html>
